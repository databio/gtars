[package]
name = "gtars-py"
version = "0.8.0"
edition = "2024"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html
[lib]
name = "gtars"
crate-type = ["cdylib"]

[features]
default = ["refget", "tokenizers", "genomic_distributions", "models", "utils", "vrs"]
refget = ["dep:gtars-refget"]
tokenizers = ["dep:gtars-tokenizers", "dep:gtars-core"]
genomic_distributions = ["dep:gtars-genomicdist"]
models = ["dep:gtars-core", "dep:gtars-genomicdist"]
utils = ["dep:gtars-core", "dep:gtars-io"]
vrs = ["dep:gtars-vrs"]

[dependencies]
anyhow = { workspace = true }
serde_json = { workspace = true }
pyo3 = { version = "0.27.1", features=["anyhow", "extension-module"] }
openssl = { version = "0.10", features = ["vendored"] }
tikv-jemallocator = { version = "0.6", features = ["disable_initial_exec_tls"] }

# our code (optional, behind feature flags)
gtars-core = { path = "../gtars-core", features=["bigbed", "http"], optional = true }
gtars-genomicdist = { path = "../gtars-genomicdist", optional = true }
gtars-refget = { path = "../gtars-refget", optional = true }
gtars-tokenizers = { path = "../gtars-tokenizers", features = ["huggingface"], optional = true }
gtars-io = { path = "../gtars-io", optional = true }
gtars-vrs = { path = "../gtars-vrs", optional = true }
