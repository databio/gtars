name: Publish
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      crates:
        description: 'Publish to crates.io'
        type: choice
        default: 'all'
        options:
          - all
          - none
          - gtars
          - gtars-bbcache
          - gtars-cli
          - gtars-core
          - gtars-fragsplit
          - gtars-genomicdist
          - gtars-igd
          - gtars-io
          - gtars-overlaprs
          - gtars-refget
          - gtars-scoring
          - gtars-tokenizers
          - gtars-uniwig
          - gtars-vrs
      python:
        description: 'Publish Python bindings'
        type: boolean
        default: true
      cli:
        description: 'Publish CLI binaries'
        type: boolean
        default: true
      wasm:
        description: 'Publish WASM to NPM'
        type: boolean
        default: true
      node:
        description: 'Publish Node native bindings to NPM'
        type: boolean
        default: true
      r:
        description: 'Publish R bindings binary package'
        type: boolean
        default: true

permissions:
  contents: write
  id-token: write

jobs:
  publish-single-crate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.crates != 'none' && inputs.crates != 'all' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Publish ${{ inputs.crates }} to crates.io
        run: cargo publish -p ${{ inputs.crates }} --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Publish exactly one crate to crates.io, keyed off a release tag of the form
  # `<crate>-v<version>` (e.g. `gtars-refget-v0.9.1`). The crate name is the tag
  # with the trailing `-v<version>` stripped. Dependencies must already be on
  # crates.io, so cut crate releases in dependency order (gtars-core before
  # gtars-refget, then gtars, etc.). Tags that don't name a crates.io package
  # (the pure bindings) are skipped here.
  publish-crate:
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - name: Resolve crate from tag and publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          CRATE="${TAG%-v*}"
          # Workspace members published to crates.io (everything except the pure
          # bindings gtars-python / gtars-r / gtars-wasm / gtars-node).
          CRATES="gtars-core gtars-io gtars-overlaprs gtars-refget gtars-uniwig gtars-bbcache gtars-fragsplit gtars-tokenizers gtars-igd gtars-scoring gtars-genomicdist gtars-vrs gtars gtars-cli"
          case " $CRATES " in
            *" $CRATE "*) : ;;
            *) echo "Tag '$TAG' -> '$CRATE' is not a crates.io package; skipping crate publish."; exit 0 ;;
          esac
          if cargo publish -p "$CRATE" --locked 2>publish_err.log; then
            echo "published $CRATE"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "$CRATE already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi

  # Emergency "republish the whole workspace" path. No longer runs on a
  # release — releases publish a single crate via `publish-crate` (keyed off
  # the `<crate>-v<version>` tag). Kept for manual dispatch only.
  publish-all-crates:
    if: ${{ github.event_name == 'workflow_dispatch' && (inputs.crates == 'all' || inputs.crates == '') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth

      # Wave 1: leaf crates
      - name: Publish gtars-core
        run: |
          if cargo publish -p gtars-core --locked 2>publish_err.log; then
            echo "published gtars-core"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-core already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish gtars-io
        run: |
          if cargo publish -p gtars-io --locked 2>publish_err.log; then
            echo "published gtars-io"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-io already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io indexing
        run: sleep 30

      # Wave 2: depend on wave 1 (gtars-core / gtars-io)
      - name: Publish gtars-overlaprs
        run: |
          if cargo publish -p gtars-overlaprs --locked 2>publish_err.log; then
            echo "published gtars-overlaprs"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-overlaprs already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-refget
        run: |
          if cargo publish -p gtars-refget --locked 2>publish_err.log; then
            echo "published gtars-refget"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-refget already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-uniwig
        run: |
          if cargo publish -p gtars-uniwig --locked 2>publish_err.log; then
            echo "published gtars-uniwig"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-uniwig already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-bbcache
        run: |
          if cargo publish -p gtars-bbcache --locked 2>publish_err.log; then
            echo "published gtars-bbcache"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-bbcache already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-fragsplit
        run: |
          if cargo publish -p gtars-fragsplit --locked 2>publish_err.log; then
            echo "published gtars-fragsplit"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-fragsplit already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io indexing
        run: sleep 30

      # Wave 3: depend on wave 2 (gtars-overlaprs / gtars-refget)
      - name: Publish gtars-tokenizers
        run: |
          if cargo publish -p gtars-tokenizers --locked 2>publish_err.log; then
            echo "published gtars-tokenizers"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-tokenizers already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-igd
        run: |
          if cargo publish -p gtars-igd --locked 2>publish_err.log; then
            echo "published gtars-igd"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-igd already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-scoring
        run: |
          if cargo publish -p gtars-scoring --locked 2>publish_err.log; then
            echo "published gtars-scoring"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-scoring already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-genomicdist
        run: |
          if cargo publish -p gtars-genomicdist --locked 2>publish_err.log; then
            echo "published gtars-genomicdist"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-genomicdist already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Publish gtars-vrs
        run: |
          if cargo publish -p gtars-vrs --locked 2>publish_err.log; then
            echo "published gtars-vrs"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-vrs already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io indexing
        run: sleep 30

      # Wave 4: aggregators (gtars depends on wave 3; gtars-cli depends on gtars)
      - name: Publish gtars
        run: |
          if cargo publish -p gtars --locked 2>publish_err.log; then
            echo "published gtars"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
      - name: Wait for crates.io indexing
        run: sleep 30

      - name: Publish gtars-cli
        run: |
          if cargo publish -p gtars-cli --locked 2>publish_err.log; then
            echo "published gtars-cli"
          elif grep -qiE "already uploaded|already exists" publish_err.log; then
            echo "gtars-cli already on crates.io — skipping"
          else
            cat publish_err.log >&2
            exit 1
          fi
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Bindings build from source in-repo (path deps), so none of them need the
  # crates published first. Each runs only when its own `<package>-v*` release
  # tag is cut (or when explicitly toggled on a manual dispatch).
  publish-python:
    if: >-
      ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'gtars-python-v'))
        || (github.event_name == 'workflow_dispatch' && inputs.python) }}
    uses: ./.github/workflows/build-python-bindings.yml
    secrets: inherit

  publish-cli:
    if: >-
      ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'gtars-cli-v'))
        || (github.event_name == 'workflow_dispatch' && inputs.cli) }}
    uses: ./.github/workflows/build-binaries.yml
    secrets: inherit

  # Attaches the prebuilt binary tarball to the release (gtars-r-v* tags only).
  publish-r:
    if: >-
      ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'gtars-r-v'))
        || (github.event_name == 'workflow_dispatch' && inputs.r) }}
    uses: ./.github/workflows/build-r-bindings.yml
    secrets: inherit

  publish-wasm:
    if: >-
      ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'gtars-wasm-v'))
        || (github.event_name == 'workflow_dispatch' && inputs.wasm) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build and publish WASM to NPM
        run: |
          npm install -g npm@latest   # OIDC trusted publishing requires npm >= 11.5.1
          wasm-pack build --release --target web gtars-wasm
          jq '.name = "@databio/gtars" | .repository = {"type": "git", "url": "https://github.com/databio/gtars"}' gtars-wasm/pkg/package.json > tmp.json && mv tmp.json gtars-wasm/pkg/package.json
          if npm publish --provenance --access public gtars-wasm/pkg/ 2>npm_err.log; then
            echo "published @databio/gtars"
          elif grep -qiE "cannot publish over|previously published|already exists" npm_err.log; then
            echo "@databio/gtars already published at this version — skipping"
          else
            cat npm_err.log >&2
            exit 1
          fi

  build-node:
    if: >-
      ${{ (github.event_name == 'release' && startsWith(github.event.release.tag_name, 'gtars-node-v'))
        || (github.event_name == 'workflow_dispatch' && inputs.node) }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        working-directory: gtars-node
        run: |
          npm install
          npx napi build --platform --release --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-bindings-${{ matrix.target }}
          path: gtars-node/*.node

  publish-node:
    if: ${{ always() && needs.build-node.result == 'success' }}
    needs: build-node
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: node-bindings-*
          path: gtars-node/artifacts
          merge-multiple: false
      - name: Move artifacts into place
        working-directory: gtars-node
        run: |
          ls -R artifacts/
          cp artifacts/*/*.node .
          ls -la *.node
      - name: Prepare platform packages
        working-directory: gtars-node
        run: |
          npm install -g npm@latest   # OIDC trusted publishing requires npm >= 11.5.1
          npm install
          npx napi prepublish -t npm --skip-gh-release
          # napi prepublish generates index.js/index.d.ts but may not copy .node files
          # into platform dirs; copy them explicitly
          cp gtars-node.linux-x64-gnu.node npm/linux-x64-gnu/ 2>/dev/null || true
          cp gtars-node.darwin-arm64.node npm/darwin-arm64/ 2>/dev/null || true
          ls -la npm/*/
      - name: Publish platform packages
        working-directory: gtars-node
        run: |
          FAILED=0
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              # OIDC trusted publishing auto-generates provenance, which validates
              # repository.url; the napi-generated platform package.json lacks it.
              jq '.repository = {"type":"git","url":"https://github.com/databio/gtars"}' "$dir/package.json" > "$dir/package.json.tmp" && mv "$dir/package.json.tmp" "$dir/package.json"
              echo "Publishing $dir..."
              if npm publish "$dir" --access public 2>npm_err.log; then
                echo "published $dir"
              elif grep -qiE "cannot publish over|previously published|already exists" npm_err.log; then
                echo "$dir already published — skipping"
              else
                cat npm_err.log >&2
                echo "::error::Failed to publish $dir"
                FAILED=$((FAILED + 1))
              fi
            fi
          done
          if [ "$FAILED" -gt 0 ]; then
            echo "::error::$FAILED platform package(s) failed to publish"
            exit 1
          fi
      - name: Publish main package
        working-directory: gtars-node
        run: |
          if npm publish --access public --ignore-scripts 2>npm_err.log; then
            echo "published @databio/gtars-node"
          elif grep -qiE "cannot publish over|previously published|already exists" npm_err.log; then
            echo "@databio/gtars-node already published at this version — skipping"
          else
            cat npm_err.log >&2
            exit 1
          fi

