[package]
name = "gtars-vrs"
version = "0.7.0"
edition = "2024"
description = "GA4GH VRS (Variation Representation Specification) allele digest computation"
license = "MIT"
repository = "https://github.com/databio/gtars"

[dependencies]
# Workspace dependencies
anyhow = { workspace = true }
serde_json = { workspace = true }
flate2 = { workspace = true }

# Fast digest path (avoid serde per-variant in hot loop)
sha2 = "0.10.7"
base64-url = "2.0.0"
itoa = "1.0"

# Parallel VCF processing (reader + worker pool)
crossbeam-channel = "0.5"

# BGZF-aware multithreaded decompression for parallel VCF reader.
# BGZF files decompress block-by-block across a worker pool; plain gzip
# falls back to flate2::MultiGzDecoder.
noodles-bgzf = "0.46"

# Internal dependency
gtars-refget = { path = "../gtars-refget", version = "0.7.0" }

# Swap the global allocator in example binaries (bench-only; library unaffected).
# Linux-gated in the examples to match gtars-python's pattern.
[target.'cfg(target_os = "linux")'.dependencies]
tikv-jemallocator = { version = "0.6", features = ["disable_initial_exec_tls"] }

[dev-dependencies]
tempfile = "3.8.1"
serde_yaml = "0.9"
memmap2 = "0.9"
